name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run only"
        type: boolean
        default: false

jobs:
  test:
    name: Test before publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm test

  publish:
    name: Publish sentrail to npm
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm
      - run: npm ci
      - name: Publish (dry run)
        if: ${{ inputs.dry_run == true }}
        run: npm publish --access public --dry-run --provenance

      - name: Publish
        if: ${{ github.event_name == 'push' || inputs.dry_run == false }}
        run: npm publish --access public --provenance
        # No NODE_AUTH_TOKEN needed — uses OIDC Trusted Publisher
        # configured at npmjs.com/package/sentrail/access
